---
# ConfigMap: Shared application configuration
# Placeholder values are resolved by CI/CD pipeline from Terraform outputs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sobel-config
  namespace: apps
data:
  RABBITMQ_HOST: "rabbitmq.infra.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"
  REDIS_HOST: "redis.infra.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  GCS_UPLOAD_BUCKET: "<GCS_UPLOAD_BUCKET>"
  GCS_RESULT_BUCKET: "<GCS_RESULT_BUCKET>"
  FRAGMENT_GRID_SIZE: "4"
  FRAGMENT_TTL_MS: "30000"
  MAX_RETRIES: "3"
  LOG_LEVEL: "INFO"
---
# Secrets are created by the CI/CD pipeline, not committed to version control.
# Expected secrets (created by workflows/pipeline-infrastructure-services.yaml):
#
# Namespace: infra
#   - rabbitmq-secret:  rabbitmq-password
#   - redis-secret:     redis-password
#
# Namespace: apps
#   - rabbitmq-secret:  rabbitmq-password
#   - redis-secret:     redis-password
#   - sobel-secrets:    GCS_SERVICE_ACCOUNT_KEY
