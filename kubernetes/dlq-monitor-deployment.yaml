---
# DLQ Monitor Deployment — consumes dead-letter queue, logs failures, retries
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlq-monitor
  namespace: apps
  labels:
    app: dlq-monitor
    component: monitoring
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dlq-monitor
  template:
    metadata:
      labels:
        app: dlq-monitor
        component: monitoring
    spec:
      containers:
        - name: dlq-monitor
          image: gcr.io/PROJECT_ID/dlq-monitor:latest
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: sobel-config
          env:
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: rabbitmq-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
            - name: GCS_SERVICE_ACCOUNT_KEY
              valueFrom:
                secretKeyRef:
                  name: sobel-secrets
                  key: GCS_SERVICE_ACCOUNT_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            periodSeconds: 10
            failureThreshold: 2
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
# Service: ClusterIP — internal (health checks, metrics)
apiVersion: v1
kind: Service
metadata:
  name: dlq-monitor
  namespace: apps
  labels:
    app: dlq-monitor
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    app: dlq-monitor
